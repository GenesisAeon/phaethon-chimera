site_name: phaethon-chimera
site_description: "GenesisAeon Package 35 — Phaethon-Asteroid: Frustrated UTAC Systems & Chimera States"
site_author: Johann Römer
repo_url: https://github.com/GenesisAeon/phaethon-chimera
repo_name: GenesisAeon/phaethon-chimera

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.annotate
    - content.code.copy
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - CLI Reference: cli.md
  - DESTINY+ Predictions: destiny.md
