# ZTF Photometry Summary for 3200 Phaethon
# Zwicky Transient Facility — near-perihelion observations

source: "Zwicky Transient Facility (ZTF), Palomar Observatory"
period_covered: "2018-2023"

near_perihelion_observations:
  # Phaethon brightens anomalously near perihelion (not simple dust scattering)
  perihelion_brightness_excess_mag: 0.12
  # Consistent with thermal emission or Na emission analogue
  color_index_V_minus_R: -0.08  # slightly blue

variability:
  rotation_period_hours: 3.604
  amplitude_mag: 0.09  # low — nearly spherical
  lightcurve_quality: "good"

activity_detections:
  stereo_heliospheric_imager:
    years: [2009, 2012]
    detections: 2
    description: "Dust/Na tail detected at perihelion by STEREO/HI1"
  emission_probability_per_orbit: 0.23  # P35 parameter

genesisaeon_utac_fit:
  r_growth_rate: 0.18
  sigma_steepness: 2.2
  gamma_crep: 0.165
  comment: "Fitted to ZTF amplitude variability and STEREO emission detections"
